# Decap CMS configuration — the admin panel at /admin reads this file.
#
# Auth in production: Netlify Identity + Git Gateway (see README for setup).
# Auth locally: run `npm run cms` alongside `npm run dev` and /admin will
# talk to your local git repo directly, no login needed.

backend:
  name: git-gateway
  branch: main

# When decap-server (npm run cms) is running on localhost, the CMS writes
# straight to the local repo. This flag is ignored in production.
local_backend: true

# Uploaded images land in src/assets/uploads/ so Astro can optimize them
# at build time. The public_folder path is relative to a post file in
# src/content/posts/, which is what gets written into the frontmatter.
media_folder: "src/assets/uploads"
public_folder: "../../assets/uploads"

collections:
  # Landing page — a single editable file (not a list of entries), so it uses
  # `files:` rather than `folder:`. Lets the maintainer swap the hero and other
  # landing photos and edit the two headline lines without touching code.
  - name: settings
    label: Site settings
    editor:
      preview: false
    files:
      - name: landing
        label: Landing page
        file: "src/content/settings/landing.yml"
        fields:
          - {
              label: Hero tagline,
              name: tagline,
              widget: string,
              hint: "The line under the big title on the front page.",
            }
          - {
              label: Identity line,
              name: identity_line,
              widget: string,
              hint: "The single line of copy over the crossfading photos, e.g. 'Rooted in Naltoqa. Serving Nagaland.'",
            }
          - {
              label: Hero photo,
              name: hero,
              widget: image,
              hint: "Full-screen background photo at the top of the front page. Use a large landscape image.",
            }
          - label: Identity crossfade photos
            name: identity_images
            widget: list
            min: 1
            max: 3
            field: { label: Photo, name: image, widget: image }
            hint: "Up to 3 photos that slowly crossfade behind the identity line."
          - { label: Events tile photo, name: door_events, widget: image }
          - { label: School tile photo, name: door_school, widget: image }
          - { label: Culture tile photo, name: door_culture, widget: image }

  - name: posts
    label: Posts
    label_singular: Post
    folder: "src/content/posts"
    create: true
    slug: "{{slug}}"
    sortable_fields: [date, title]
    fields:
      - { label: Title, name: title, widget: string }
      - {
          label: Date,
          name: date,
          widget: datetime,
          format: "YYYY-MM-DD",
          date_format: "YYYY-MM-DD",
          time_format: false,
          picker_utc: true,
        }
      - {
          label: Category,
          name: category,
          widget: select,
          options: [events, school, culture],
        }
      - { label: Location, name: location, widget: string, required: false }
      - {
          label: Cover photo,
          name: cover_photo,
          widget: image,
          hint: "Landscape orientation. Shown on cards, the gallery, and the post header.",
        }
      - {
          label: Cover photo alt text,
          name: cover_alt,
          widget: string,
          hint: "Describe the photo for screen readers, e.g. 'Jawans marching on the parade ground'.",
        }
      - label: Gallery
        name: gallery
        widget: list
        min: 5
        max: 30
        summary: "{{fields.alt}}"
        fields:
          - { label: Image, name: image, widget: image }
          - { label: Alt text, name: alt, widget: string }
      - {
          label: Story,
          name: body,
          widget: markdown,
          hint: "2–6 short paragraphs.",
        }
      - {
          label: Tags,
          name: tags,
          widget: list,
          required: false,
          default: [],
          hint: "Free-form, comma separated — e.g. tuluni, festival, community",
        }
